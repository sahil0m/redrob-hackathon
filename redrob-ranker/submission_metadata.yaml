# ============================================================================
# AI tools declaration (transparency only; honest declaration not penalized)
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude as a pair-programming and code-review assistant during development
  (architecture discussion, refactoring, docstrings). All design decisions,
  feature definitions, JD-rubric encoding, honeypot calibration, and scoring
  weights were authored and verified by the team against the actual dataset.
  No candidate data was sent to any hosted LLM, and no LLM is called during
  ranking (the pipeline is CPU-only and offline by constraint).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Intent-aware hybrid ranker, CPU-only and offline. We encode the JD as
  structured, auditable fit criteria (every weight cites a JD sentence) rather
  than keyword-matching. Per candidate we compute interpretable [0,1] features:
  role_fit (title is the decisive anti-keyword-stuffer signal), system_evidence
  (two-tier: built ranking/retrieval/recsys vs supporting production-ML/A-B work,
  so plain-language Tier-5s are rewarded without buzzwords), must_have retrieval
  + eval skills (with an endorsement/duration trust factor), experience band x
  product-vs-services fraction, and location. A hybrid JD-similarity signal
  combines e5-small-v2 dense embeddings (precomputed offline) with BM25. An
  XGBoost learning-to-rank model refines the ordering, trained on a proxy
  relevance label distilled transparently from the JD's own "ideal candidate"
  rubric; the interpretable linear blend is kept as a fallback. The final score
  is base x behavioral-availability multiplier x JD-disqualifier penalties, with
  a hard honeypot gate to zero (0 honeypots in our top-100). Reasoning strings
  are generated only from facts that drove each score. Ranking runs in well under
  5 minutes on CPU once embeddings are cached.

